server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Handle clean URLs (Next.js static export)
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Old URL redirects
    location = /privacy.html { return 301 /photofresh/privacy; }
    location = /support.html { return 301 /photofresh/support; }
    location = /privacy     { return 301 /photofresh/privacy; }
    location = /support     { return 301 /photofresh/support; }

    # Cache static assets
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
